plugins {
    id 'com.android.application'
}

android {
    namespace 'com.acezeradev.playermusic'
    compileSdk 36

    defaultConfig {
        applicationId 'com.acezeradev.playermusic'
        minSdk 26
        targetSdk 36
        versionCode 4
        versionName '1.3.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}
